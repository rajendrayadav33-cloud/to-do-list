<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Premium Task Manager v2 | Glow Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--primary:#38bdf8;
--danger:#ef4444;
--success:#22c55e;
--warn:#f59e0b;
--border:#334155;
--glow-primary:0 0 20px rgba(56,189,248,0.3);
--glow-success:0 0 20px rgba(34,197,94,0.3);
--glow-card:0 0 15px rgba(56,189,248,0.1);
}

body{
background:var(--bg);
color:var(--text);
padding:20px;
min-height:100vh;
transition:.3s;
}

body.light{
--bg:#f8fafc;
--card:#ffffff;
--text:#111827;
--muted:#64748b;
--primary:#2563eb;
--border:#e5e7eb;
--glow-primary:0 0 20px rgba(37,99,235,0.2);
--glow-card:0 0 15px rgba(37,99,235,0.05);
}

body.green{
--bg:#052e16;
--card:#14532d;
--text:#dcfce7;
--muted:#86efac;
--primary:#22c55e;
--border:#166534;
}

body.purple{
--bg:#2e1065;
--card:#581c87;
--text:#f3e8ff;
--muted:#d8b4fe;
--primary:#c084fc;
--border:#7e22ce;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
background:var(--card);
padding:20px;
border-radius:20px;
border:1px solid var(--border);
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:800;
color:var(--primary);
}

.clock{
font-size:14px;
color:var(--primary);
font-weight:600;
}

.theme-box{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.theme-btn{
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
background:var(--bg);
color:var(--text);
font-weight:600;
}

.search{
padding:12px;
border:none;
outline:none;
border-radius:12px;
background:var(--bg);
color:var(--text);
min-width:220px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:var(--card);
padding:18px;
border-radius:18px;
border:1px solid var(--border);
text-align:center;
}

.card h2{
color:var(--primary);
font-size:28px;
font-weight:800;
}

.form{
display:grid;
grid-template-columns:2fr repeat(7,1fr) auto;
gap:10px;
margin-bottom:20px;
}

.form input,.form select,.form button{
padding:12px;
border:none;
outline:none;
border-radius:12px;
background:var(--card);
color:var(--text);
}

.form button{
background:var(--primary);
color:white;
font-weight:700;
cursor:pointer;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filters button{
padding:10px 16px;
border:none;
border-radius:30px;
cursor:pointer;
background:var(--card);
color:var(--text);
}

.filters .active{
background:var(--primary);
color:white;
}

.task-list{
display:flex;
flex-direction:column;
gap:14px;
}

.task{
background:var(--card);
border:1px solid var(--border);
padding:16px;
border-radius:18px;
display:grid;
grid-template-columns:2fr 1fr auto;
gap:15px;
align-items:center;
}

.task.completed{
opacity:.7;
text-decoration:line-through;
}

.task.high{border-left:6px solid #ef4444;}
.task.medium{border-left:6px solid #facc15;}
.task.low{border-left:6px solid #22c55e;}

.name{
font-size:18px;
font-weight:700;
margin-bottom:8px;
}

.meta{
font-size:13px;
color:var(--muted);
line-height:1.6;
}

.timer{
font-size:18px;
font-weight:800;
text-align:center;
}

.good{color:#22c55e;}
.warn{color:#f59e0b;}
.bad{color:#ef4444;}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.actions button{
border:none;
padding:10px 12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
color:white;
}

.done{background:#22c55e;}
.edit{background:#6366f1;}
.del{background:#ef4444;}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--card);
padding:30px;
border-radius:20px;
z-index:9999;
text-align:center;
border:2px solid var(--primary);
}

.popup button{
margin:6px;
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
color:white;
}

.empty{
text-align:center;
padding:40px;
opacity:.7;
font-size:18px;
}

.save-toast{
position:fixed;
bottom:30px;
right:30px;
background:#22c55e;
color:#fff;
padding:12px 24px;
border-radius:40px;
font-weight:600;
z-index:9998;
}

@media(max-width:1000px){
.form{grid-template-columns:1fr;}
.task{grid-template-columns:1fr;}
.search{width:100%;}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
<div>
<div class="title">⚡ Premium Task Manager v2</div>
<div class="clock" id="clock"></div>
</div>

<input class="search" id="search" placeholder="🔍 Search tasks...">

<div class="theme-box">
<button class="theme-btn" onclick="setTheme('dark')">🌙 Dark</button>
<button class="theme-btn" onclick="setTheme('light')">☀️ Light</button>
<button class="theme-btn" onclick="setTheme('green')">💚 Green</button>
<button class="theme-btn" onclick="setTheme('purple')">💜 Purple</button>
<button class="theme-btn" onclick="backupData()">💾 Backup</button>
<button class="theme-btn" onclick="deleteAllTasks()">🗑 Delete All</button>
</div>
</div>

<div class="grid">
<div class="card"><h2 id="total">0</h2>Total Tasks</div>
<div class="card"><h2 id="pending">0</h2>Pending</div>
<div class="card"><h2 id="done">0</h2>Completed</div>
<div class="card"><h2 id="late">0</h2>Overdue</div>
</div>

<div class="form">
<input id="title" placeholder="📝 Enter task title...">

<select id="category">
<option>📚 Study</option>
<option>💼 Work</option>
<option>🏃 Health</option>
<option>🎯 Personal</option>
</select>

<select id="priority">
<option>🟢 Low</option>
<option selected>🟡 Medium</option>
<option>🔴 High</option>
</select>

<select id="repeat">
<option value="none">No Repeat</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
</select>

<select id="alarm">
<option value="60">1h before</option>
<option value="30">30m before</option>
<option value="20">20m before</option>
<option value="10">10m before</option>
<option value="5">5m before</option>
</select>

<input type="date" id="date">
<select id="hour"></select>
<select id="minute"></select>

<select id="ampm">
<option>AM</option>
<option>PM</option>
</select>

<button onclick="addTask()">✨ Add Task</button>
</div>

<div class="filters">
<button class="active" onclick="setFilter('all',this)">All</button>
<button onclick="setFilter('pending',this)">Pending</button>
<button onclick="setFilter('completed',this)">Completed</button>
<button onclick="setFilter('overdue',this)">Overdue</button>
</div>

<div class="task-list" id="list"></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("ptasksv2")) || [];
let filter = "all";
let searchText = "";

function save(){
localStorage.setItem("ptasksv2",JSON.stringify(tasks));
}

function left(dt){
let diff = new Date(dt)-new Date();
if(diff<=0) return {text:"OVERDUE",cls:"bad"};
let s=Math.floor(diff/1000)%60;
let m=Math.floor(diff/60000)%60;
let h=Math.floor(diff/3600000)%24;
let d=Math.floor(diff/86400000);
let text=d>0?`${d}d ${h}h left`:h>0?`${h}h ${m}m left`:`${m}m ${s}s left`;
let cls="good";
if(d===0 && h<3) cls="warn";
if(d===0 && h===0 && m<30) cls="bad";
return {text,cls};
}

function renderTasks(){
let data=[...tasks];

if(filter==="pending") data=data.filter(x=>!x.completed);
if(filter==="completed") data=data.filter(x=>x.completed);
if(filter==="overdue") data=data.filter(x=>!x.completed && new Date(x.datetime)<new Date());

if(searchText){
data=data.filter(x=>x.title.toLowerCase().includes(searchText));
}

document.getElementById("total").innerText=tasks.length;
document.getElementById("pending").innerText=tasks.filter(x=>!x.completed).length;
document.getElementById("done").innerText=tasks.filter(x=>x.completed).length;
document.getElementById("late").innerText=tasks.filter(x=>!x.completed && new Date(x.datetime)<new Date()).length;

if(data.length===0){
document.getElementById("list").innerHTML=`<div class="empty">No tasks found</div>`;
return;
}

document.getElementById("list").innerHTML=data.map(t=>{
let tm=left(t.datetime);
let p=t.priority.includes("High")?"high":t.priority.includes("Medium")?"medium":"low";

return `
<div class="task ${p} ${t.completed?'completed':''}">
<div>
<div class="name">${t.title}</div>
<div class="meta">
${t.category}<br>
${t.priority}<br>
${new Date(t.datetime).toLocaleString("en-IN")}
</div>
</div>

<div class="timer ${tm.cls}">
${t.completed?"DONE":tm.text}
</div>

<div class="actions">
<button class="done" onclick="toggleTask(${t.id})">${t.completed?"Undo":"Done"}</button>
<button class="edit" onclick="editTask(${t.id})">Edit</button>
<button class="del" onclick="deleteTask(${t.id})">Delete</button>
</div>
</div>
`;
}).join("");
}

function addTask(){
let title=document.getElementById("title").value.trim();
if(!title) return alert("Enter title");

let h=parseInt(document.getElementById("hour").value);
let m=document.getElementById("minute").value;
let ap=document.getElementById("ampm").value;

if(ap==="PM" && h!==12) h+=12;
if(ap==="AM" && h===12) h=0;

h=String(h).padStart(2,"0");

tasks.push({
id:Date.now(),
title:title,
category:document.getElementById("category").value,
priority:document.getElementById("priority").value,
repeat:document.getElementById("repeat").value,
alarm:document.getElementById("alarm").value,
datetime:document.getElementById("date").value+"T"+h+":"+m,
completed:false
});

save();
renderTasks();
document.getElementById("title").value="";
}

function toggleTask(id){
let t=tasks.find(x=>x.id==id);
t.completed=!t.completed;
save();
renderTasks();
}

function deleteTask(id){
tasks=tasks.filter(x=>x.id!=id);
save();
renderTasks();
}

function editTask(id){
let t=tasks.find(x=>x.id==id);
let n=prompt("Edit task",t.title);
if(n){
t.title=n;
save();
renderTasks();
}
}

function deleteAllTasks(){
if(confirm("Delete all tasks?")){
tasks=[];
save();
renderTasks();
}
}

function setFilter(f,btn){
filter=f;
document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
renderTasks();
}

function setTheme(t){
if(t==="dark"){
document.body.className="";
}else{
document.body.className=t;
}
localStorage.setItem("themev2",t);
}

function backupData(){
let data=JSON.stringify(tasks,null,2);
let blob=new Blob([data],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="tasks-backup.json";
a.click();
}

function updateClock(){
document.getElementById("clock").innerText=
new Date().toLocaleString("en-IN");
}

function initTimeSelectors(){
let hour=document.getElementById("hour");
let minute=document.getElementById("minute");

for(let i=1;i<=12;i++){
hour.innerHTML+=`<option>${String(i).padStart(2,'0')}</option>`;
}

for(let i=0;i<60;i++){
minute.innerHTML+=`<option>${String(i).padStart(2,'0')}</option>`;
}

let now=new Date();
document.getElementById("date").value=now.toISOString().split("T")[0];

let hh=now.getHours();
let ap=hh>=12?"PM":"AM";
hh=hh%12;
if(hh===0) hh=12;

document.getElementById("hour").value=String(hh).padStart(2,'0');
document.getElementById("minute").value=String(now.getMinutes()).padStart(2,'0');
document.getElementById("ampm").value=ap;
}

function startupReminder(){
setTimeout(()=>{
alert("Reminder: Before leaving website, click Backup to save your tasks.");
},500);
}

function init(){
initTimeSelectors();
setTheme(localStorage.getItem("themev2") || "dark");
renderTasks();
updateClock();
startupReminder();

setInterval(updateClock,1000);

document.getElementById("search").addEventListener("input",function(e){
searchText=e.target.value.toLowerCase();
renderTasks();
});
}

init();
</script>
</body>
</html>
